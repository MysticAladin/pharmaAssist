<div class="page-container">
  <div class="page-header">
    <div class="d-flex align-items-center gap-2">
      <a routerLink="/territories" class="btn btn-outline-secondary btn-sm">
        <i class="icon-arrow-left"></i>
      </a>
      <div>
        <h1>{{ (isEditMode() ? 'territories.editTerritory' : 'territories.addTerritory') | translate }}</h1>
        <p class="text-muted mb-0">{{ (isEditMode() ? 'territories.editSubtitle' : 'territories.addSubtitle') | translate }}</p>
      </div>
    </div>
  </div>

  @if (loading()) {
    <div class="loading-spinner">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>
  } @else {
    <div class="card">
      <div class="card-body">
        <form (ngSubmit)="save()">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">{{ 'territories.name' | translate }} *</label>
              <input type="text" class="form-control" [(ngModel)]="form().name" name="name" required>
            </div>

            <div class="col-md-6">
              <label class="form-label">{{ 'territories.nameLocal' | translate }}</label>
              <input type="text" class="form-control" [(ngModel)]="form().nameLocal" name="nameLocal">
            </div>

            <div class="col-md-6">
              <label class="form-label">{{ 'territories.type' | translate }} *</label>
              <select class="form-select" [(ngModel)]="form().type" name="type">
                @for (entry of typeLabels | keyvalue; track entry.key) {
                  <option [value]="entry.key">{{ entry.value }}</option>
                }
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label">{{ 'territories.parentTerritory' | translate }}</label>
              <input type="number" class="form-control" [(ngModel)]="form().parentTerritoryId" name="parentTerritoryId" placeholder="{{ 'territories.parentTerritoryPlaceholder' | translate }}">
            </div>

            <div class="col-md-6">
              <label class="form-label">{{ 'territories.cantonIds' | translate }}</label>
              <input type="text" class="form-control" [(ngModel)]="form().cantonIds" name="cantonIds" placeholder='[1, 2, 3]'>
            </div>

            <div class="col-md-6">
              <label class="form-label">{{ 'territories.municipalityIds' | translate }}</label>
              <input type="text" class="form-control" [(ngModel)]="form().municipalityIds" name="municipalityIds" placeholder='[1, 2, 3]'>
            </div>

            <div class="col-12">
              <label class="form-label">{{ 'territories.description' | translate }}</label>
              <textarea class="form-control" rows="3" [(ngModel)]="form().description" name="description"></textarea>
            </div>

            @if (isEditMode()) {
              <div class="col-md-6">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" [(ngModel)]="form().isActive" name="isActive" id="isActive">
                  <label class="form-check-label" for="isActive">{{ 'common.active' | translate }}</label>
                </div>
              </div>
            }
          </div>

          <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-primary" [disabled]="saving()">
              @if (saving()) {
                <span class="spinner-border spinner-border-sm me-1"></span>
              }
              {{ (isEditMode() ? 'common.update' : 'common.create') | translate }}
            </button>
            <a routerLink="/territories" class="btn btn-outline-secondary">{{ 'common.cancel' | translate }}</a>
          </div>
        </form>
      </div>
    </div>
  }
</div>

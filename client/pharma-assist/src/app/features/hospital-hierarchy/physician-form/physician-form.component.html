<div class="container mx-auto p-6 max-w-2xl">
  <!-- Header -->
  <div class="mb-6">
    <a [routerLink]="getBackRoute()" class="text-sm text-blue-600 hover:underline mb-2 inline-block">
      &larr; {{ 'HOSPITAL.BACK_TO_PHYSICIANS' | translate }}
    </a>
    <h1 class="text-2xl font-bold text-gray-900">
      {{ (isEdit() ? 'HOSPITAL.EDIT_PHYSICIAN' : 'HOSPITAL.ADD_PHYSICIAN') | translate }}
    </h1>
  </div>

  @if (loading()) {
    <div class="flex justify-center py-12">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
    </div>
  }

  @if (!loading()) {
    <form (ngSubmit)="save()" class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 space-y-5">
      <!-- Full Name -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            {{ 'HOSPITAL.FULL_NAME' | translate }} *
          </label>
          <input type="text"
                 [ngModel]="formData().fullName"
                 (ngModelChange)="updateFormField('fullName', $event)"
                 name="fullName"
                 required
                 class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            {{ 'HOSPITAL.FULL_NAME_LOCAL' | translate }}
          </label>
          <input type="text"
                 [ngModel]="formData().fullNameLocal"
                 (ngModelChange)="updateFormField('fullNameLocal', $event)"
                 name="fullNameLocal"
                 class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
        </div>
      </div>

      <!-- Specialty -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            {{ 'HOSPITAL.SPECIALTY_LABEL' | translate }} *
          </label>
          <select [ngModel]="formData().specialty"
                  (ngModelChange)="updateFormField('specialty', $event)"
                  name="specialty"
                  required
                  class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            @for (opt of specialtyOptions; track opt.value) {
              <option [ngValue]="opt.value">{{ opt.label }}</option>
            }
          </select>
        </div>
        @if (isSpecialtyOther()) {
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
              {{ 'HOSPITAL.SPECIALTY_OTHER' | translate }}
            </label>
            <input type="text"
                   [ngModel]="formData().specialtyOther"
                   (ngModelChange)="updateFormField('specialtyOther', $event)"
                   name="specialtyOther"
                   class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
          </div>
        }
      </div>

      <!-- Department -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          {{ 'HOSPITAL.DEPARTMENT' | translate }}
        </label>
        <select [ngModel]="formData().departmentId"
                (ngModelChange)="updateFormField('departmentId', $event)"
                name="departmentId"
                class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
          <option [ngValue]="undefined">{{ 'COMMON.NONE' | translate }}</option>
          @for (dept of departments(); track dept.id) {
            <option [ngValue]="dept.id">{{ dept.name }}</option>
          }
        </select>
      </div>

      <!-- License & Contact -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            {{ 'HOSPITAL.LICENSE_NUMBER' | translate }}
          </label>
          <input type="text"
                 [ngModel]="formData().licenseNumber"
                 (ngModelChange)="updateFormField('licenseNumber', $event)"
                 name="licenseNumber"
                 class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            {{ 'HOSPITAL.PHONE' | translate }}
          </label>
          <input type="tel"
                 [ngModel]="formData().phone"
                 (ngModelChange)="updateFormField('phone', $event)"
                 name="phone"
                 class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            {{ 'HOSPITAL.EMAIL' | translate }}
          </label>
          <input type="email"
                 [ngModel]="formData().email"
                 (ngModelChange)="updateFormField('email', $event)"
                 name="email"
                 class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
        </div>
      </div>

      <!-- KOL Status -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          {{ 'HOSPITAL.KOL_STATUS' | translate }}
        </label>
        <select [ngModel]="formData().kolStatus"
                (ngModelChange)="updateFormField('kolStatus', $event)"
                name="kolStatus"
                class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
          @for (opt of kolOptions; track opt.value) {
            <option [ngValue]="opt.value">{{ opt.label }}</option>
          }
        </select>
      </div>

      <!-- Notes -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          {{ 'HOSPITAL.NOTES' | translate }}
        </label>
        <textarea [ngModel]="formData().notes"
                  (ngModelChange)="updateFormField('notes', $event)"
                  name="notes"
                  rows="3"
                  class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
        </textarea>
      </div>

      <!-- Actions -->
      <div class="flex justify-end gap-3 pt-4 border-t border-gray-200">
        <a [routerLink]="getBackRoute()"
           class="btn btn-outline">
          {{ 'COMMON.CANCEL' | translate }}
        </a>
        <button type="submit" class="btn btn-primary" [disabled]="saving()">
          @if (saving()) {
            <span class="animate-spin mr-2">&#9696;</span>
          }
          {{ (isEdit() ? 'COMMON.SAVE' : 'COMMON.CREATE') | translate }}
        </button>
      </div>
    </form>
  }
</div>
